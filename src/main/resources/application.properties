# ms-checkin · application.properties | Puerto: 8084 | BD: db_hotel_checkin

# spring.application.name: nombre del microservicio de check-in en el sistema distribuido
spring.application.name=ms-checkin
# server.port: puerto HTTP exclusivo donde Tomcat atiende solicitudes de check-in
server.port=8084
# spring.datasource.url: URL de conexión a la base de datos exclusiva del proceso de check-in
spring.datasource.url=jdbc:mysql://localhost:3306/db_hotel_checkin?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username: usuario con acceso a la base de datos de check-in
spring.datasource.username=root
# spring.datasource.password: contraseña MySQL (vacía en instalaciones locales como XAMPP)
spring.datasource.password=
# spring.datasource.driver-class-name: driver JDBC de MySQL requerido por Spring Boot
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.hibernate.ddl-auto: crea y actualiza tablas automáticamente en desarrollo
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql: muestra el SQL generado por Hibernate en consola
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql: mejora la legibilidad del SQL en consola
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.properties.hibernate.dialect: configura el dialecto SQL para MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
